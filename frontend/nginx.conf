server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets (JS/CSS/svg); the report stream is proxied, not static.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA client-side routing (react-router): unknown paths fall back to index.html
    # so a hard refresh on /runs/<id> or /history serves the app, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE → backend service on the compose network.
    #
    # proxy_buffering off is REQUIRED for the SSE stream
    # (GET /api/runs/{id}/events): with buffering on, nginx holds the response
    # until its buffer fills, so live tokens / the interrupt event never flush to
    # the browser and the run appears frozen. It is harmless for the JSON routes.
    location /api/ {
        # Re-resolve the backend hostname via Docker's embedded DNS (127.0.0.11)
        # instead of caching its IP at startup. Without this, a restarted/recreated
        # backend container (new IP) would 502 until nginx reloaded — which would
        # break the "restart backend mid-approval, then resume" durability demo.
        # A variable proxy_pass forces per-request resolution; $request_uri keeps
        # the full /api/... path + query.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Clear Connection so upstream keep-alive isn't downgraded to close.
        proxy_set_header Connection "";

        proxy_buffering off;              # SSE-safe (see note above)
        proxy_cache off;
        proxy_read_timeout 3600s;         # long-lived SSE connections
        chunked_transfer_encoding off;    # let upstream control chunking
    }
}
