name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so import-time Settings() (fail-fast on missing required keys)
      # succeeds during ruff/mypy/pytest. No real secrets required.
      OPENAI_API_KEY: sk-ci-dummy
      TAVILY_API_KEY: tvly-ci-dummy
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Mypy (typecheck)
        run: uv run mypy app evals
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Vitest
        run: npm run test

  # Both images must build on every PR (F13). Build-only — nothing is pushed.
  # docker-build-frontend also exercises the full `npm run build` (tsc -b + vite).
  docker-build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  docker-build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # Validate the merged compose config parses. `env_file: [.env]` needs the file
  # to exist, so write a throwaway one with dummy values first.
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Seed a dummy .env for interpolation
        run: cp .env.example .env
      - name: Validate compose config
        run: docker compose config
