name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so import-time Settings() (fail-fast on missing required keys)
      # succeeds during ruff/mypy/pytest. No real secrets required.
      OPENAI_API_KEY: sk-ci-dummy
      TAVILY_API_KEY: tvly-ci-dummy
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Mypy (typecheck)
        run: uv run mypy app evals
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Vitest
        run: npm run test
